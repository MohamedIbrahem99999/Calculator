<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="bootstrap.min.css"> 
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>

<body style="background-color: blueviolet;">

<div class="container con">
    <form action="" class="calculator">
        <input type="text" name="" id="value" class="value">
        <span class="key" data-val="clear"><i>c</i></span>
       <span class="key" data-val="/"><i>/</i></span>
        <span class="key" data-val="*"><i>*</i></span>
        <span class="key" data-val="7"><i>7</i></span>
        <span class="key" data-val="8"><i>8</i></span>
        <span class="key" data-val="9"><i>9</i></span>
        <span class="key" data-val="-"><i>-</i></span>
        <span class="key" data-val="4"><i>4</i></span>
        <span class="key" data-val="5"><i>5</i></span>
        <span class="key" data-val="6"><i>6</i></span>
        <span class="key" data-val="+"><i>+</i></span>
        <span class="key" data-val="1"><i>1</i></span>
        <span class="key" data-val="2"><i>2</i></span>
        <span class="key" data-val="3"><i>3</i></span>
        <span class="key" data-val="0"><i>0</i></span>
        <span class="key" data-val="00"><i>00</i></span>
        <span class="key" data-val="."><i>.</i></span>
        <span class="key" data-val="equal"><i>=</i></span>

        <span></span>
    </form>
</div>






    <!-- <script src="../JS/bootstrap.bundle.min.js"></script> -->
    <script src="main.js"></script>
</body>

</html>
