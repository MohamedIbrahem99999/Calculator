<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="all.min.css">
    <link rel="stylesheet" href="style.css">

    <title>Calculator</title>
</head>
<body>

<div class="container">

    <div class="calculator">

       <input type="text" class="display" id="value" readonly>

<button class="btn clear" data-val="clear">C</button>
<button class="btn back" data-val="back">
    <i class="fa-solid fa-delete-left"></i>
</button>
<button class="btn operator divide" data-val="/">/</button>

<button class="btn number" data-val="7">7</button>
<button class="btn number" data-val="8">8</button>
<button class="btn number" data-val="9">9</button>
<button class="btn operator multiply" data-val="*">*</button>

<button class="btn number" data-val="4">4</button>
<button class="btn number" data-val="5">5</button>
<button class="btn number" data-val="6">6</button>
<button class="btn operator minus" data-val="-">-</button>

<button class="btn number" data-val="1">1</button>
<button class="btn number" data-val="2">2</button>
<button class="btn number" data-val="3">3</button>
<button class="btn plus" data-val="+">+</button>

<button class="btn number zero" data-val="0">0</button>
<button class="btn number" data-val=".">.</button>
<button class="btn equal" data-val="equal">=</button>
    </div>

</div>

<script src="main.js"></script>

</body>
</html>
